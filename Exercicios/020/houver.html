    <title>Exemplo de hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
       
        }
        div > p {
            display: none;
        
        }
        div:hover > p {
            display: block;
            color: white;
            background-color: rgba(255, 217, 0, 0.932);
            width: 300px;
        }
        
        div:hover{
            color: red;
        }
    </style>
</head>
