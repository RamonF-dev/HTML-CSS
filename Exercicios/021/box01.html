<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo De caixas</title>
    <style>
        h1{  /*box-level*/
            background-color: bisque;
            width: 378px;
            height: 37px;

            border-width: 5px;
            border-style: solid;
            border-color: rgba(248, 185, 161, 0.726);

            border: 5px  solid   rgba(248, 185, 161, 0.726) ;

            padding: 10px;

            margin: 20px 20px 40px 20px;

            outline: 5px dashed khaki;
        }
        a{     /*inline-level*/ 
             border: 5px solid  rgba(255, 67, 67, 0.699);
            
             padding: 10px;
        }
        
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos tambem são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona</p>
</body>
</html>
